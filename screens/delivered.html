<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#E8570A"/>
  <title>ChopNow — Livré !</title>
  <link rel="stylesheet" href="../css/base.css"/>
  <link rel="stylesheet" href="../css/animations.css"/>
  <link rel="stylesheet" href="../css/layout.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <style>
    .screen { align-items: center; justify-content: center; padding: 32px 24px; text-align: center; }
    .del-title { font-size: 28px; font-weight: 900; margin-bottom: 8px; }
    .del-sub   { font-size: 15px; color: var(--muted2); line-height: 1.6; margin-bottom: 28px; }
    .del-order { background: var(--card); border-radius: 14px; padding: 12px 18px; font-size: 13px; color: var(--muted2); margin-bottom: 28px; width: 100%; border: 1px solid var(--border); }
    .del-order span { color: var(--orange); font-weight: 700; }
    .rate-lbl  { font-size: 14px; color: var(--muted2); margin-bottom: 12px; }
    .del-btns  { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 24px; }
    .content   { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; width: 100%; }
  </style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span id="clock">9:41</span>
    <div class="status-icons"><span>▲▲</span><span>📶</span><span>🔋</span></div>
  </div>
  <div class="screen">
    <canvas id="confetti"></canvas>
    <div class="content">
      <div class="del-ring">🎉</div>
      <div style="height:20px"></div>
      <div class="del-title">Livré ! Bon appétit 🍽️</div>
      <div class="del-sub">Jean-Pierre a livré ta commande.<br/>Tu vas te régaler !</div>
      <div class="del-order">Commande <span>#CHN-20260413-0042</span> · <span id="totalDisplay">8 600 FCFA</span></div>
      <div class="rate-lbl">Comment était ton expérience ?</div>
      <div class="stars-row">
        <span class="star" onclick="rate(1)">⭐</span>
        <span class="star" onclick="rate(2)">⭐</span>
        <span class="star" onclick="rate(3)">⭐</span>
        <span class="star" onclick="rate(4)">⭐</span>
        <span class="star" onclick="rate(5)">⭐</span>
      </div>
      <div class="del-btns">
        <button class="btn btn-primary" onclick="goHome()">Retour à l'accueil</button>
        <button class="btn btn-secondary" onclick="navigate('restaurant')">Commander à nouveau</button>
      </div>
    </div>
  </div>
</div>
<script src="../js/app.js"></script>
<script src="../js/cart.js"></script>
<script>
  // Show total
  const total = sessionStorage.getItem('orderTotal');
  if (total) document.getElementById('totalDisplay').textContent = fmt(Number(total));

  // Confetti on load
  window.addEventListener('load', () => setTimeout(launchConfetti, 300));

  function rate(n) {
    document.querySelectorAll('.star').forEach((s, i) => s.classList.toggle('on', i < n));
    showToast(n === 5 ? 'Merci pour ton 5 étoiles ! ⭐' : 'Merci pour ton avis !');
  }

  function goHome() {
    clearCart();
    navigate('home', true);
  }
</script>
</body>
</html>
