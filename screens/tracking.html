<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#E8570A"/>
  <title>ChopNow — Suivi</title>
  <link rel="stylesheet" href="../css/base.css"/>
  <link rel="stylesheet" href="../css/animations.css"/>
  <link rel="stylesheet" href="../css/layout.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <style>
    .screen { padding-bottom: 20px; }
    .order-card { margin: 14px 20px; flex-shrink: 0; }
    .order-ref  { font-size: 12px; color: var(--muted2); margin-bottom: 14px; }
    .order-ref span { color: var(--orange); font-weight: 700; }
    .rider-section { margin: 0 20px 12px; }
    .eta-section   { margin: 0 20px; }
    .sim-btn { margin: 14px 20px 0; padding: 14px; background: var(--card2); border: 1px solid var(--border); border-radius: 14px; color: var(--muted2); font-size: 14px; font-weight: 600; cursor: pointer; width: calc(100% - 40px); }
  </style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span id="clock">9:41</span>
    <div class="status-icons"><span>▲▲</span><span>📶</span><span>🔋</span></div>
  </div>
  <div class="screen">
    <!-- Map -->
    <div class="map">
      <div class="map-grid"></div>
      <div class="map-road-h"></div>
      <div class="map-road-v"></div>
      <span class="map-label" style="top:30%;left:10%">Bonamoussadi</span>
      <span class="map-label" style="top:65%;right:15%">Makepe</span>
      <span class="map-label" style="top:20%;right:25%">Kotto</span>
      <div class="map-dest">📍</div>
      <div class="map-rider">🏍️</div>
      <svg class="map-svg" viewBox="0 0 390 230">
        <path class="route-path" d="M 130 160 Q 200 120 240 95"/>
      </svg>
      <button class="map-back" onclick="navigate('home', true)">←</button>
    </div>

    <!-- Order status -->
    <div class="order-card card">
      <div class="order-ref">Commande <span>#CHN-20260413-0042</span></div>
      <div class="steps">
        <div class="step done" id="st0">
          <div class="step-dot">✓</div>
          <div><div class="step-lbl">Commande confirmée</div><div class="step-sub">Paiement reçu · 14:32</div></div>
        </div>
        <div class="step done" id="st1">
          <div class="step-dot">✓</div>
          <div><div class="step-lbl">En préparation</div><div class="step-sub">Mama Benz prépare ta commande</div></div>
        </div>
        <div class="step now" id="st2">
          <div class="step-dot">🏍️</div>
          <div><div class="step-lbl">Livreur en route</div><div class="step-sub">Jean-Pierre récupère ta commande</div></div>
        </div>
        <div class="step" id="st3">
          <div class="step-dot">🏠</div>
          <div><div class="step-lbl">Livré</div><div class="step-sub">En attente</div></div>
        </div>
      </div>
    </div>

    <!-- Rider -->
    <div class="rider-section card" style="display:flex;align-items:center;gap:14px">
      <div class="rider-av">🧑🏿</div>
      <div style="flex:1">
        <div class="rider-name">Jean-Pierre K.</div>
        <div class="rider-rating">⭐ 4.8 · 312 livraisons</div>
      </div>
      <div class="rider-btns">
        <button class="rider-btn rb-msg" onclick="showToast('Message envoyé 💬')">💬</button>
        <button class="rider-btn rb-call" onclick="showToast('Appel en cours… 📞')">📞</button>
      </div>
    </div>

    <!-- ETA -->
    <div class="eta-section eta-pill">
      <span class="eta-lbl">Arrivée estimée</span>
      <span class="eta-val" id="etaVal">12 min</span>
    </div>

    <button class="sim-btn" onclick="simulateDelivery()">Simuler la livraison →</button>
  </div>
</div>
<script src="../js/app.js"></script>
<script>
  // ETA countdown
  let etaMins = 12;
  const etaInterval = setInterval(() => {
    if (etaMins > 0) etaMins--;
    const el = document.getElementById('etaVal');
    if (el) el.textContent = etaMins > 0 ? `${etaMins} min` : 'Arrivée imminente ! 🏍️';
  }, 7000);

  function simulateDelivery() {
    document.getElementById('st2').className = 'step done';
    document.getElementById('st3').className = 'step now';
    clearInterval(etaInterval);
    document.getElementById('etaVal').textContent = 'Livraison en cours…';
    setTimeout(() => {
      document.getElementById('st3').className = 'step done';
      showToast('Livraison confirmée ! 🎉');
      setTimeout(() => navigate('delivered'), 800);
    }, 1200);
  }
</script>
</body>
</html>
