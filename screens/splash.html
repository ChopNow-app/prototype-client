<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#E8570A"/>
  <title>ChopNow</title>
  <link rel="stylesheet" href="../css/base.css"/>
  <link rel="stylesheet" href="../css/animations.css"/>
  <link rel="stylesheet" href="../css/layout.css"/>
  <style>
    .screen {
      justify-content: center;
      align-items: center;
    }
    .splash-bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 35%, rgba(232,87,10,.15), transparent 65%);
    }
    .splash-content {
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: scale-in .8s cubic-bezier(.34,1.56,.64,1) both;
    }
    .splash-icon {
      width: 96px; height: 96px;
      border-radius: 26px;
      box-shadow: 0 16px 48px rgba(232,87,10,.5);
      overflow: hidden;
      flex-shrink: 0;
    }
    .splash-icon svg { width: 100%; height: 100%; display: block; }
    .splash-wordmark { width: 190px; }
    .splash-wordmark svg { width: 100%; height: auto; display: block; }
    .splash-tag  { font-size: 15px; color: var(--muted2); }
    .dots { display: flex; gap: 7px; margin-top: 40px; }
    .dot  { width: 7px; height: 7px; border-radius: 4px; background: var(--border2); animation: dot-pulse 1.4s ease infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
  </style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span id="clock">9:41</span>
    <div class="status-icons"><span>▲▲</span><span>📶</span><span>🔋</span></div>
  </div>
  <div class="screen">
    <div class="splash-bg"></div>
    <div class="splash-content">
      <div class="splash-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <defs>
            <radialGradient id="heat" cx="38%" cy="32%" r="70%">
              <stop offset="0%" stop-color="#FF6520"/>
              <stop offset="55%" stop-color="#E8570A"/>
              <stop offset="100%" stop-color="#C04008"/>
            </radialGradient>
            <radialGradient id="warmth" cx="59.5%" cy="37.9%" r="35%">
              <stop offset="0%" stop-color="#FF8040" stop-opacity="0.22"/>
              <stop offset="55%" stop-color="#E8570A" stop-opacity="0.09"/>
              <stop offset="100%" stop-color="#E8570A" stop-opacity="0"/>
            </radialGradient>
          </defs>
          <rect width="512" height="512" rx="112" fill="url(#heat)"/>
          <path d="M 256,432 C 210,372 116,308 116,194 A 140,140 0 0 0 396,194 C 396,308 302,372 256,432 Z" fill="white"/>
          <circle cx="256" cy="194" r="96" fill="url(#warmth)"/>
          <path d="M 305,153 A 64,64 0 1 0 305,235" stroke="#0F0F0F" stroke-width="62" stroke-linecap="round" fill="none"/>
          <path d="M 300,150 C 280,126 307,110 290,86" stroke="rgba(232,87,10,0.62)" stroke-width="9" stroke-linecap="round" fill="none"/>
          <path d="M 313,146 C 334,122 298,106 318,80" stroke="rgba(232,87,10,0.40)" stroke-width="8" stroke-linecap="round" fill="none"/>
          <path d="M 325,153 C 352,126 316,108 340,76" stroke="rgba(232,87,10,0.22)" stroke-width="7" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <div class="splash-wordmark">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 56">
          <text x="0" y="46" font-family="-apple-system,system-ui,sans-serif" font-size="48" font-weight="800" letter-spacing="-2">
            <tspan fill="#FFFFFF">Chop</tspan><tspan fill="#E8570A">Now</tspan><tspan fill="#E8570A" font-size="32" dy="4">CM</tspan>
          </text>
        </svg>
      </div>
      <div class="splash-tag">Livraison rapide à Douala 🇨🇲</div>
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>
</div>
<script src="../js/app.js"></script>
<script>
  setTimeout(() => navigate('phone'), 3500);
</script>
</body>
</html>
