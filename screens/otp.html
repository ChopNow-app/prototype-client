<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#E8570A"/>
  <title>ChopNow — Code OTP</title>
  <link rel="stylesheet" href="../css/base.css"/>
  <link rel="stylesheet" href="../css/animations.css"/>
  <link rel="stylesheet" href="../css/layout.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <style>
    .screen    { padding: 0 24px 40px; }
    .otp-title { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    .otp-num   { font-size: 15px; color: var(--muted2); margin-bottom: 28px; }
    .otp-num strong { color: var(--text); font-weight: 700; }
    .otp-footer { text-align: center; font-size: 14px; color: var(--muted2); margin-bottom: 32px; }
    .otp-footer a { color: var(--orange); font-weight: 600; cursor: pointer; }
    .otp-timer  { color: var(--orange); font-weight: 700; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span id="clock">9:41</span>
    <div class="status-icons"><span>▲▲</span><span>📶</span><span>🔋</span></div>
  </div>
  <div class="screen">
    <div class="nav-header">
      <button class="back-btn" onclick="navigate('phone', true)">←</button>
      <span class="nav-title">Vérification</span>
    </div>

    <div style="font-size:44px;margin-bottom:16px">🔐</div>
    <div class="otp-title">Code WhatsApp</div>
    <div class="otp-num">Envoyé au <strong id="phoneDisplay">+237 6XX XXX XXX</strong></div>

    <div class="otp-row">
      <input class="otp-box" id="ob0" maxlength="1" inputmode="numeric"/>
      <input class="otp-box" id="ob1" maxlength="1" inputmode="numeric"/>
      <input class="otp-box" id="ob2" maxlength="1" inputmode="numeric"/>
      <input class="otp-box" id="ob3" maxlength="1" inputmode="numeric"/>
      <input class="otp-box" id="ob4" maxlength="1" inputmode="numeric"/>
      <input class="otp-box" id="ob5" maxlength="1" inputmode="numeric"/>
    </div>

    <div class="otp-footer">
      Pas reçu ? <a onclick="showToast('Code renvoyé ! 💬')">Renvoyer</a>
      · <span class="otp-timer" id="otpTimer">0:59</span>
    </div>

    <button class="btn btn-primary" onclick="navigate('home')">Valider →</button>
  </div>
</div>
<script src="../js/app.js"></script>
<script>
  // Show phone number
  const phone = sessionStorage.getItem('phone') || '6XX XXX XXX';
  document.getElementById('phoneDisplay').textContent = '+237 ' + phone;

  // OTP boxes
  for (let i = 0; i < 6; i++) {
    const box = document.getElementById('ob' + i);
    box.addEventListener('input', e => {
      const v = e.target.value.replace(/\D/g, '');
      e.target.value = v;
      if (v) {
        box.classList.add('filled');
        const next = document.getElementById('ob' + (i + 1));
        if (next) next.focus();
        else setTimeout(() => navigate('home'), 400);
      } else {
        box.classList.remove('filled');
      }
    });
    box.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !box.value) {
        document.getElementById('ob' + (i - 1))?.focus();
      }
    });
  }

  // Countdown timer
  let sec = 59;
  const timer = setInterval(() => {
    if (sec > 0) sec--;
    const el = document.getElementById('otpTimer');
    if (el) el.textContent = `${Math.floor(sec/60)}:${String(sec%60).padStart(2,'0')}`;
  }, 1000);
</script>
</body>
</html>
