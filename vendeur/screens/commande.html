<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#E8570A"/>
  <title>ChopNow Vendeur — Nouvelle commande</title>
  <link rel="stylesheet" href="../../css/base.css"/>
  <link rel="stylesheet" href="../../css/animations.css"/>
  <link rel="stylesheet" href="../../css/layout.css"/>
  <link rel="stylesheet" href="../../css/components.css"/>
  <style>
    .screen { justify-content: space-between; padding: 24px 20px 32px; }

    .alert-header { text-align: center; margin-bottom: 16px; }
    .alert-pulse {
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(232,87,10,.15); border: 2px solid rgba(232,87,10,.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; margin: 0 auto 14px;
      animation: pulse-ring 1.5s ease infinite;
    }
    .alert-title { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
    .alert-sub   { font-size: 14px; color: var(--muted2); }

    /* Countdown */
    .countdown-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 16px; }
    .countdown-ring { position: relative; width: 80px; height: 80px; }
    .countdown-ring svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
    .countdown-ring circle { fill: none; stroke-width: 5; }
    .countdown-ring .bg { stroke: var(--border2); }
    .countdown-ring .fg { stroke: var(--orange); stroke-linecap: round; transition: stroke-dashoffset .9s linear, stroke .3s; }
    .countdown-ring.urgent .fg { stroke: #ef4444; }
    .countdown-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 900; color: var(--orange); transition: color .3s; }
    .countdown-ring.urgent .countdown-num { color: #ef4444; }
    .countdown-lbl { font-size: 11px; color: var(--muted); margin-top: 6px; text-transform: uppercase; letter-spacing: .06em; }

    /* Order detail */
    .order-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 14px; }
    .order-head { background: linear-gradient(135deg, #160800, #1e0d00); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .order-num  { font-size: 15px; font-weight: 800; color: var(--orange); }
    .order-client { font-size: 13px; color: var(--muted2); }

    /* Items list */
    .item-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 16px; border-bottom: 1px solid var(--border); }
    .item-row:last-child { border-bottom: none; }
    .item-left { display: flex; align-items: center; gap: 10px; }
    .item-qty  { width: 26px; height: 26px; background: rgba(232,87,10,.12); border: 1px solid rgba(232,87,10,.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: var(--orange); flex-shrink: 0; }
    .item-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .item-price { font-size: 13px; font-weight: 700; color: var(--muted2); }

    .order-total { padding: 12px 16px; display: flex; justify-content: space-between; border-top: 1px solid var(--border); background: rgba(232,87,10,.04); }
    .total-lbl { font-size: 14px; font-weight: 700; color: var(--text); }
    .total-val { font-size: 17px; font-weight: 900; color: var(--orange); }

    /* Client info */
    .client-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: var(--card); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 14px; }
    .client-ico  { font-size: 22px; }
    .client-info { flex: 1; }
    .client-name { font-size: 13px; font-weight: 700; color: var(--text); }
    .client-addr { font-size: 12px; color: var(--muted2); margin-top: 1px; }

    /* Action buttons */
    .action-row { display: flex; gap: 12px; }
    .btn-refuse { flex: 1; padding: 16px; background: var(--card2); border: 1px solid var(--border2); border-radius: var(--r); color: var(--muted); font-size: 15px; font-weight: 700; cursor: pointer; transition: background .15s; }
    .btn-accept { flex: 2; padding: 16px; background: linear-gradient(135deg, #c94a00, var(--orange)); border: none; border-radius: var(--r); color: #fff; font-size: 15px; font-weight: 800; cursor: pointer; box-shadow: 0 8px 24px var(--orange-glow); transition: transform .1s; }
    .btn-accept:active { transform: scale(.97); }
    .btn-refuse:active { background: var(--border); }
  </style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span id="clock">9:41</span>
    <div class="status-icons"><span>▲▲</span><span>📶</span><span>🔋</span></div>
  </div>
  <div class="screen">

    <div>
      <div class="alert-header">
        <div class="alert-pulse">🔔</div>
        <div class="alert-title">Nouvelle commande !</div>
        <div class="alert-sub">Confirme ou refuse dans le temps imparti</div>
      </div>

      <div class="countdown-wrap">
        <div class="countdown-ring" id="countRing">
          <svg viewBox="0 0 80 80" width="80" height="80">
            <circle class="bg" cx="40" cy="40" r="36"/>
            <circle class="fg" id="ring" cx="40" cy="40" r="36"
              stroke-dasharray="226" stroke-dashoffset="0"/>
          </svg>
          <div class="countdown-num" id="countNum">45</div>
        </div>
        <div class="countdown-lbl">secondes pour confirmer</div>
      </div>

      <div class="order-card">
        <div class="order-head">
          <span class="order-num">Commande #4872</span>
          <span class="order-client">Kouamé Brice</span>
        </div>
        <div class="item-row">
          <div class="item-left">
            <div class="item-qty">×1</div>
            <span class="item-name">Ndolé + poisson braisé</span>
          </div>
          <span class="item-price">3 500</span>
        </div>
        <div class="item-row">
          <div class="item-left">
            <div class="item-qty">×1</div>
            <span class="item-name">Jus de bissap maison</span>
          </div>
          <span class="item-price">500</span>
        </div>
        <div class="order-total">
          <span class="total-lbl">Total commande</span>
          <span class="total-val">4 000 FCFA</span>
        </div>
      </div>

      <div class="client-row">
        <span class="client-ico">📍</span>
        <div class="client-info">
          <div class="client-name">Livraison · Bonamoussadi, face lycée</div>
          <div class="client-addr">1.2 km · Livreur assigné automatiquement</div>
        </div>
      </div>
    </div>

    <div>
      <div class="action-row" style="margin-bottom:10px">
        <button class="btn-refuse" onclick="refuse()">✕ Refuser</button>
        <button class="btn-accept" onclick="accept()">✓ Accepter</button>
      </div>
      <button style="width:100%;padding:13px;background:none;border:1px solid var(--border2);border-radius:var(--r);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer" onclick="goBack()">← Retour au dashboard</button>
    </div>

  </div>
</div>
<script src="../js/app.js"></script>
<script>
  const TOTAL = 45;
  const CIRC  = 226;
  let remaining = TOTAL;

  const ring      = document.getElementById('ring');
  const num       = document.getElementById('countNum');
  const countRing = document.getElementById('countRing');

  const timer = setInterval(() => {
    remaining--;
    num.textContent = remaining;
    ring.style.strokeDashoffset = CIRC * (1 - remaining / TOTAL);
    if (remaining <= 10) countRing.classList.add('urgent');
    if (remaining <= 0) {
      clearInterval(timer);
      num.textContent = '⏰';
      showToast('Temps écoulé — commande annulée automatiquement');
      setTimeout(() => navigate('dashboard', true), 1600);
    }
  }, 1000);

  function accept() {
    clearInterval(timer);
    showToast('Commande acceptée ✅');
    setTimeout(() => navigate('preparation'), 800);
  }

  function refuse() {
    clearInterval(timer);
    showToast('Commande refusée');
    setTimeout(() => navigate('dashboard', true), 800);
  }

  function goBack() {
    clearInterval(timer);
    navigate('dashboard', true);
  }
</script>
</body>
</html>
