<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 72" width="460" height="72">
  <!--
    LOGO WHITE — CHOPNOWCM · DARK BG
    ════════════════════════════════════════════════════
    "Chop" → White  · reads on any dark surface
    "Now"  → Orange · glows against darkness
    "CM"   → Orange · Cameroun identifier
    Place on: #0F0F0F · deep photos · dark ads
    ════════════════════════════════════════════════════
  -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700&amp;display=swap');
    </style>
    <filter id="icon-float" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="5"
                    flood-color="white" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Icon 64×64 — frosted glass, floating -->
  <g transform="translate(0, 4)">
    <rect width="64" height="64" rx="14"
          fill="rgba(255,255,255,0.11)"
          stroke="rgba(255,255,255,0.24)"
          stroke-width="1"
          filter="url(#icon-float)"/>

    <!-- White pin -->
    <path d="M 32,54
             C 26.3,46.5 14.5,38.5 14.5,24.25
             A 17.5,17.5 0 0 0 49.5,24.25
             C 49.5,38.5 37.7,46.5 32,54
             Z"
          fill="white"/>

    <!-- Specular highlight -->
    <path d="M 17.5,22.7 A 14.5,14.5 0 0 1 46.5,22.7"
          stroke="rgba(255,255,255,0.30)" stroke-width="1.5"
          fill="none" stroke-linecap="round"/>

    <!-- Bowl — dark inside white pin -->
    <path d="M 38.1,19.1 A 8,8 0 1 0 38.1,29.4"
          stroke="rgba(10,10,10,0.55)"
          stroke-width="5" stroke-linecap="round" fill="none"/>

    <!-- Steam wisps — white on frosted glass -->
    <path d="M 37.5,18.7 C 35.0,15.7 38.4,13.8 36.3,10.8"
          stroke="rgba(255,255,255,0.55)" stroke-width="1.1"
          stroke-linecap="round" fill="none"/>
    <path d="M 39.1,18.3 C 41.7,15.3 37.2,13.3 39.7,10.0"
          stroke="rgba(255,255,255,0.36)" stroke-width="1.0"
          stroke-linecap="round" fill="none"/>
    <path d="M 40.6,19.1 C 44.0,15.8 39.5,13.5 42.5,9.5"
          stroke="rgba(255,255,255,0.20)" stroke-width="0.9"
          stroke-linecap="round" fill="none"/>
  </g>

  <!-- Wordmark — Chop white · NowCM orange -->
  <text
    x="82" y="55"
    font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif"
    font-size="50" font-weight="700" letter-spacing="-2">
    <tspan fill="white">Chop</tspan><tspan fill="#E8570A">Now</tspan><tspan fill="#E8570A">CM</tspan>
  </text>
</svg>
